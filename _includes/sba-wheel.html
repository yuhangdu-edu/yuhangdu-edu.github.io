<style>
.sba-wrap {
  margin: 1.5em 0;
}
.sba-header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1em;
  margin-bottom: 1em;
}
.sba-parity-name {
  font-weight: 700;
  font-size: 1.05em;
}
.sba-switch-btn {
  padding: 0.45em 1.1em;
  border-radius: 20px;
  border: 2px solid #888;
  background: none;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.88em;
  transition: background 0.15s, border-color 0.15s;
}
.sba-switch-btn:hover {
  background: #eee;
  border-color: #555;
}
.sba-body {
  display: flex;
  gap: 1.5em;
  align-items: flex-start;
  flex-wrap: wrap;
  justify-content: center;
}
#sbaCanvas {
  cursor: pointer;
  display: block;
  max-width: 100%;
  height: auto;
  flex-shrink: 0;
}
.sba-readout {
  flex: 1;
  min-width: 210px;
  max-width: 300px;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 0.9em 1em;
  background: #fafafa;
  font-size: 0.88em;
}
.sba-readout-title {
  font-weight: 700;
  font-size: 1em;
  margin: 0 0 0.6em;
  padding-bottom: 0.45em;
  border-bottom: 2px solid #ddd;
}
.sba-readout-hint {
  color: #888;
  font-style: italic;
  text-align: center;
  padding: 1em 0;
}
.sba-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.3em 0;
  border-bottom: 1px solid #eee;
}
.sba-row:last-child { border-bottom: none; }
.sba-scenario { color: #444; flex: 1; }
.sba-pct {
  font-weight: 700;
  padding: 0.12em 0.45em;
  border-radius: 4px;
  min-width: 2.2em;
  text-align: center;
}
.sba-salmon   { background: #f4a0a0; color: #7a0000; }
.sba-lgreen   { background: #a8d8a8; color: #1a5c1a; }
.sba-dgreen   { background: #5a9a5a; color: #fff; }
.sba-legend {
  display: flex;
  gap: 1em;
  flex-wrap: wrap;
  margin-top: 0.7em;
  justify-content: center;
  font-size: 0.8em;
  color: #555;
}
.sba-legend-item {
  display: inline-flex;
  align-items: center;
  gap: 0.35em;
}
.sba-dot {
  width: 11px;
  height: 11px;
  border-radius: 2px;
  display: inline-block;
  flex-shrink: 0;
}
</style>

<div class="sba-wrap">
  <div class="sba-header">
    <span class="sba-parity-name" id="sbaParityName">Nulliparous</span>
    <button class="sba-switch-btn" id="sbaSwitchBtn">Switch Parity</button>
  </div>
  <div class="sba-body">
    <canvas id="sbaCanvas" width="480" height="480" aria-label="Interactive SBA Wheel"></canvas>
    <div class="sba-readout" id="sbaReadout">
      <div class="sba-readout-hint">Click a time interval on the wheel to view P(SBA) values</div>
    </div>
  </div>
  <div class="sba-legend">
    <span class="sba-legend-item"><span class="sba-dot" style="background:#f4a0a0"></span>P(SBA) &lt; 90%</span>
    <span class="sba-legend-item"><span class="sba-dot" style="background:#a8d8a8"></span>90% ≤ P(SBA) &lt; 95%</span>
    <span class="sba-legend-item"><span class="sba-dot" style="background:#5a9a5a"></span>P(SBA) ≥ 95%</span>
  </div>
</div>

<script>
(function () {
  /* ── DATA ── */
  var LABELS = [
    '0–1h','1–2h','2–3h','3–3.5h','3.5–4h','4–4.5h','4.5–5h',
    '5–5.5h','5.5–6h','6–6.5h','6.5–7h','7–7.5h','7.5–8h',
    '8–8.5h','8.5–9h','9–9.5h','9.5–10h','10–10.5h','10.5–11h',
    '11–11.5h','11.5–12h','12+h'
  ];
  var SCENARIOS = [
    'No MWH stay',
    'Move to MWH on EDD',
    'Move 1 wk before EDD',
    'Move 2 wks before EDD',
    'Move 3 wks before EDD',
    'Move 4 wks before EDD'
  ];
  var N = 22;

  /* Table 1 – Nulliparous [row = time interval, col = scenario (No MWH … 4wks)] */
  var NULI = [
    [0.96,0.98,0.99,0.99,0.99,0.99],
    [0.92,0.96,0.98,0.99,0.99,0.99],
    [0.86,0.92,0.96,0.99,0.99,0.99],
    [0.82,0.91,0.95,0.98,0.99,0.99],
    [0.78,0.89,0.95,0.97,0.99,0.99],
    [0.74,0.87,0.94,0.97,0.98,0.99],
    [0.70,0.85,0.93,0.97,0.98,0.99],
    [0.66,0.82,0.92,0.96,0.98,0.99],
    [0.62,0.80,0.91,0.96,0.98,0.99],
    [0.58,0.78,0.90,0.95,0.98,0.99],
    [0.54,0.76,0.89,0.95,0.98,0.99],
    [0.50,0.74,0.88,0.95,0.97,0.99],
    [0.46,0.72,0.87,0.94,0.97,0.99],
    [0.42,0.70,0.86,0.94,0.97,0.99],
    [0.39,0.69,0.85,0.94,0.97,0.99],
    [0.36,0.67,0.85,0.93,0.97,0.99],
    [0.33,0.66,0.84,0.93,0.97,0.99],
    [0.30,0.64,0.83,0.93,0.97,0.99],
    [0.28,0.63,0.83,0.92,0.96,0.99],
    [0.26,0.62,0.82,0.92,0.96,0.99],
    [0.24,0.61,0.82,0.92,0.96,0.99],
    [0.22,0.60,0.81,0.92,0.96,0.99]
  ];

  /* Table 2 – Multiparous */
  var MULTI = [
    [0.93,0.96,0.98,0.99,0.99,0.99],
    [0.82,0.91,0.95,0.98,0.99,0.99],
    [0.69,0.84,0.92,0.96,0.98,0.99],
    [0.62,0.80,0.91,0.96,0.98,0.99],
    [0.56,0.77,0.89,0.95,0.98,0.99],
    [0.50,0.74,0.88,0.95,0.97,0.99],
    [0.44,0.71,0.87,0.94,0.97,0.99],
    [0.39,0.69,0.85,0.94,0.97,0.99],
    [0.35,0.66,0.84,0.93,0.97,0.99],
    [0.30,0.64,0.83,0.93,0.97,0.99],
    [0.26,0.62,0.82,0.92,0.96,0.99],
    [0.23,0.60,0.81,0.92,0.96,0.99],
    [0.19,0.59,0.81,0.92,0.96,0.99],
    [0.16,0.57,0.80,0.91,0.96,0.99],
    [0.14,0.56,0.79,0.91,0.96,0.99],
    [0.12,0.55,0.79,0.91,0.96,0.99],
    [0.10,0.54,0.78,0.91,0.96,0.99],
    [0.08,0.53,0.78,0.90,0.96,0.99],
    [0.06,0.52,0.78,0.90,0.95,0.99],
    [0.05,0.51,0.77,0.90,0.95,0.99],
    [0.04,0.51,0.77,0.90,0.95,0.99],
    [0.03,0.51,0.77,0.90,0.95,0.99]
  ];

  /* ── COLORS ── */
  var THEME = {
    nulliparous: { ring: '#2f7f93', center: '#2f7f93', text: '#fff' },
    multiparous:  { ring: '#7b5ea7', center: '#7b5ea7', text: '#fff' }
  };

  function cellBg(v) {
    if (v >= 0.95) return '#5a9a5a';
    if (v >= 0.90) return '#a8d8a8';
    return '#f4a0a0';
  }
  function cellFg(v) {
    if (v >= 0.95) return '#ffffff';
    if (v >= 0.90) return '#1a5c1a';
    return '#7a0000';
  }

  /* ── GEOMETRY ── */
  var CX = 240, CY = 240;
  var R_OUT   = 234;   // outer edge (label ring)
  var R_LABEL = 205;   // inner edge of label ring / outer edge of data rings
  /* 6 data rings, each 27 px; centre hole 43 px */
  var RING_W  = 27;
  var R_CTR   = R_LABEL - 6 * RING_W; // = 205 - 162 = 43
  var ASTEP   = (2 * Math.PI) / N;
  var A0      = -Math.PI / 2;         // start at 12 o'clock

  function angles(i) {
    var a0 = A0 + i * ASTEP, a1 = A0 + (i + 1) * ASTEP;
    return { a0: a0, a1: a1, mid: (a0 + a1) / 2 };
  }

  /* ── STATE ── */
  var parity   = 'nulliparous';
  var selected = null;
  var hover    = null;

  /* ── CANVAS SETUP ── */
  var canvas = document.getElementById('sbaCanvas');
  var ctx    = canvas.getContext('2d');
  var dpr    = window.devicePixelRatio || 1;
  canvas.width  = 480 * dpr;
  canvas.height = 480 * dpr;
  canvas.style.width  = '480px';
  canvas.style.height = '480px';
  ctx.scale(dpr, dpr);

  /* ── DRAWING HELPERS ── */
  function annulus(ri, ro, a0, a1) {
    ctx.beginPath();
    ctx.arc(CX, CY, ro, a0, a1);
    ctx.arc(CX, CY, ri, a1, a0, true);
    ctx.closePath();
  }

  function drawWheel() {
    var data  = parity === 'nulliparous' ? NULI : MULTI;
    var theme = THEME[parity];
    ctx.clearRect(0, 0, 480, 480);

    /* outer white disk */
    ctx.beginPath(); ctx.arc(CX, CY, R_OUT, 0, 2*Math.PI);
    ctx.fillStyle = '#f8f8f8'; ctx.fill();

    for (var i = 0; i < N; i++) {
      var ang = angles(i);
      var isSel = (i === selected);
      var isHov = (i === hover && i !== selected);

      /* label ring */
      annulus(R_LABEL, R_OUT, ang.a0, ang.a1);
      ctx.fillStyle = isSel ? lighten(theme.ring, 0.25) : (isHov ? lighten(theme.ring, 0.15) : theme.ring);
      ctx.fill();

      /* data rings: j=0 → No MWH (outermost), j=5 → 4 wks (innermost) */
      for (var j = 0; j < 6; j++) {
        var ro = R_LABEL - j * RING_W;
        var ri = ro - RING_W;
        var v  = data[i][j];
        var bg = isSel ? lighten(cellBg(v), 0.3) : cellBg(v);
        annulus(ri, ro, ang.a0, ang.a1);
        ctx.fillStyle = bg; ctx.fill();
      }
    }

    /* grid: concentric circles */
    for (var k = 0; k <= 6; k++) {
      var r = R_LABEL - k * RING_W;
      ctx.beginPath(); ctx.arc(CX, CY, r, 0, 2*Math.PI);
      ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 0.5; ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(CX, CY, R_OUT, 0, 2*Math.PI);
    ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1; ctx.stroke();
    ctx.beginPath(); ctx.arc(CX, CY, R_LABEL, 0, 2*Math.PI);
    ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1; ctx.stroke();

    /* grid: radial spokes */
    for (var i = 0; i < N; i++) {
      var a = A0 + i * ASTEP;
      ctx.beginPath();
      ctx.moveTo(CX + R_CTR * Math.cos(a), CY + R_CTR * Math.sin(a));
      ctx.lineTo(CX + R_OUT * Math.cos(a), CY + R_OUT * Math.sin(a));
      ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 0.5; ctx.stroke();
    }

    /* numbers in data cells */
    for (var i = 0; i < N; i++) {
      var ang  = angles(i);
      var row  = data[i];
      for (var j = 0; j < 6; j++) {
        var ro   = R_LABEL - j * RING_W;
        var ri   = ro - RING_W;
        var rMid = (ro + ri) / 2;
        var v    = row[j];
        var px   = CX + rMid * Math.cos(ang.mid);
        var py   = CY + rMid * Math.sin(ang.mid);
        ctx.save();
        ctx.translate(px, py);
        ctx.rotate(ang.mid + Math.PI / 2);
        ctx.fillStyle = cellFg(v);
        ctx.font = (j < 3 ? 'bold 9px' : 'bold 8px') + ' sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(Math.round(v * 100), 0, 0);
        ctx.restore();
      }
    }

    /* labels in label ring */
    for (var i = 0; i < N; i++) {
      var ang  = angles(i);
      var rMid = (R_LABEL + R_OUT) / 2;
      var px   = CX + rMid * Math.cos(ang.mid);
      var py   = CY + rMid * Math.sin(ang.mid);
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(ang.mid + Math.PI / 2);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 7.5px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(LABELS[i], 0, 0);
      ctx.restore();
    }

    /* selection highlight ring */
    if (selected !== null) {
      var ang = angles(selected);
      annulus(R_CTR, R_OUT, ang.a0, ang.a1);
      ctx.strokeStyle = THEME[parity].ring;
      ctx.lineWidth = 3; ctx.stroke();
    }

    /* hover highlight (subtle) */
    if (hover !== null && hover !== selected) {
      var ang = angles(hover);
      annulus(R_CTR, R_OUT, ang.a0, ang.a1);
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 1.5; ctx.stroke();
    }

    /* centre circle */
    ctx.beginPath(); ctx.arc(CX, CY, R_CTR, 0, 2*Math.PI);
    ctx.fillStyle = THEME[parity].center; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold 9px sans-serif';
    ctx.fillText('P(SBA)', CX, CY - 7);
    ctx.font = '8px sans-serif';
    ctx.fillText(parity === 'nulliparous' ? 'Nulliparous' : 'Multiparous', CX, CY + 6);
  }

  function lighten(hex, amt) {
    /* mix hex color with white by amt (0–1) */
    var r = parseInt(hex.slice(1,3),16);
    var g = parseInt(hex.slice(3,5),16);
    var b = parseInt(hex.slice(5,7),16);
    r = Math.round(r + (255-r)*amt);
    g = Math.round(g + (255-g)*amt);
    b = Math.round(b + (255-b)*amt);
    return 'rgb('+r+','+g+','+b+')';
  }

  /* ── HIT TEST ── */
  function sectorAt(x, y) {
    var dx = x - CX, dy = y - CY;
    var dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < R_CTR || dist > R_OUT) return null;
    var a = Math.atan2(dy, dx);
    var norm = ((a - A0) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
    var idx = Math.floor(norm / ASTEP);
    return (idx >= 0 && idx < N) ? idx : null;
  }

  function canvasXY(e) {
    var rect = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left) * (480 / rect.width),
      y: (e.clientY - rect.top)  * (480 / rect.height)
    };
  }

  /* ── READOUT ── */
  function updateReadout() {
    var el = document.getElementById('sbaReadout');
    if (selected === null) {
      el.innerHTML = '<div class="sba-readout-hint">Click a time interval on the wheel to view P(SBA) values</div>';
      return;
    }
    var data = parity === 'nulliparous' ? NULI : MULTI;
    var row = data[selected];
    var html = '<div class="sba-readout-title">Time to SBA: ' + LABELS[selected] + '</div>';
    for (var j = 0; j < 6; j++) {
      var v   = row[j];
      var pct = Math.round(v * 100);
      var cls = v >= 0.95 ? 'sba-dgreen' : (v >= 0.90 ? 'sba-lgreen' : 'sba-salmon');
      html += '<div class="sba-row">';
      html += '<span class="sba-scenario">' + SCENARIOS[j] + '</span>';
      html += '<span class="sba-pct ' + cls + '">' + pct + '%</span>';
      html += '</div>';
    }
    el.innerHTML = html;
  }

  /* ── EVENTS ── */
  canvas.addEventListener('click', function(e) {
    var p = canvasXY(e);
    var s = sectorAt(p.x, p.y);
    selected = (s !== null && s === selected) ? null : s;
    drawWheel();
    updateReadout();
  });

  canvas.addEventListener('mousemove', function(e) {
    var p = canvasXY(e);
    var s = sectorAt(p.x, p.y);
    if (s !== hover) {
      hover = s;
      canvas.style.cursor = s !== null ? 'pointer' : 'default';
      drawWheel();
    }
  });

  canvas.addEventListener('mouseleave', function() {
    hover = null;
    canvas.style.cursor = 'default';
    drawWheel();
  });

  document.getElementById('sbaSwitchBtn').addEventListener('click', function() {
    parity   = parity === 'nulliparous' ? 'multiparous' : 'nulliparous';
    selected = null;
    hover    = null;
    document.getElementById('sbaParityName').textContent = parity === 'nulliparous' ? 'Nulliparous' : 'Multiparous';
    this.textContent = parity === 'nulliparous' ? 'Switch to Multiparous' : 'Switch to Nulliparous';
    drawWheel();
    updateReadout();
  });

  /* ── INIT ── */
  drawWheel();
  updateReadout();
})();
</script>
